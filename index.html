<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>Document</title>
</head>

<body>

  <div class="login">
    <img class="head-logo" src="/images/logo.svg">
    <div class="login-form">
      <div class="main-area">
        <div class="login-top">
          <img class="logo" src="/images/log-in.svg" alt="login logo"><span class="login-letter">Login</span>
          <p>Insert your information below.</p>
        </div>

        <form class="input-area" action="#" method="GET">
          <div class="mail">
            <label for="mail">Email</label>
            <div class="input-wrapper">
              <img class="logo loginIcon" src="/images/mail-focus.svg">
              <input type="email" id="mail" name="mail" placeholder="Type your email">
            </div>
          </div>

          <div class="password">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <img class="logo loginIcon" src="/images/lock.svg">
              <img class="logo passwordIcon" src="/images/eye.svg">
              <input type="password" id="password" name="password" placeholder="Type your password">
            </div>

          </div>

          <div class="remindMe">
            <div>
              <input type="checkbox" class="accent-color">
              <span class="remindText">Remind me</span>
            </div>

            <p class="change-color"><strong>Forgot my password</strong></p>
          </div>

          <div>
            <button type="submit">LOGIN</button>
          </div>
          <p class="change-color text-center">Don't have an account? <span></span>
            <strong>Sign up!</strong>
          </p>
        </form>
      </div>
    </div>
  </div>

  <div class="bg-picture">
    <img src="/images/side-image.jpg">
  </div>

</body>

</html>
