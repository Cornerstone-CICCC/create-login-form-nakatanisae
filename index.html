<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <title>Document</title>
</head>

<body>
  <div class="login">
    <div class="login-form">
      <div class="main-area">
        <div class="login-top">
          <img class="logo" src="/images/log-in.svg" alt="login logo"><span>Login</span>
          <p>Insert your information below.</p>
        </div>
        
        <form class="input-area" action="#" method="GET">
          <div class="mail">
            <label for="mail">Email</label>
            <input type="email" id="mail" name="mail" placeholder="Type your email">
          </div>

          <div class="password">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Type your password">
          </div>

          <div class="remindMe">
            <input type="checkbox">
            <p>Forgot my password</p>
          </div>

          <div>
            <a href="#"><button type="submit">LOGIN</button></a>
          </div>
          <p>Don't have an account? Sign up!</p>
        </form>
          
        
      </div>

    </div>

  </div>

  <div class="bg-picture">
    <img src="/images/side-image.jpg">
  </div>


</body>

</html>
